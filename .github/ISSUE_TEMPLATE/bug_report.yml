name: Bug report
description: Something is broken or doesn't behave as documented
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The smaller and more reproducible it is, the faster we can fix it.

  - type: input
    id: sysko-version
    attributes:
      label: Sysko version
      description: Run `pnpm list @sysko/core` in your project, or paste the commit SHA if running from source.
      placeholder: "0.0.1 / commit 9c71e78"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: "v22.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you observed, including any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: |
        Minimal code or commands to reproduce the issue. A copy-pasteable snippet is ideal.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, anything else that might help.
    validations:
      required: false
