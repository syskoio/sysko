name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please:
        1. Check the [anti-roadmap](https://github.com/syskoio/sysko/blob/main/ROADMAP.md#anti-roadmap) — if your idea is listed there, it's a no.
        2. Check if the [Hook API](https://github.com/syskoio/sysko/blob/main/README.md#hook-api) already covers your use case via `sysko.onSpan(...)`.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not the specific feature. We may suggest a different solution.
      placeholder: "I can't figure out why some requests in our prod app are slow because..."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: What would you like Sysko to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't work for you.
    validations:
      required: false

  - type: dropdown
    id: thesis-check
    attributes:
      label: Does this align with the project thesis?
      description: |
        Sysko's tenets: zero-config, automatic tracing, browser-first, target audience is startups/SaaS/microservices/solo devs.
      options:
        - "Yes — keeps friction low"
        - "Maybe — I'm not sure"
        - "It adds some friction but I think it's worth it"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, examples from other tools, etc.
    validations:
      required: false
