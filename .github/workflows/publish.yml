name: Publish to npm

# Triggered automatically by release-please when it creates a release.
# release-please bumps all package versions and tags before this runs,
# so every @syskoio/* package will always have a version that doesn't exist
# on the registry yet.

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write  # required for npm provenance attestation

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Publish packages
        run: pnpm -r --filter "@syskoio/*" publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
