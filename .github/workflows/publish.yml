name: Publish to npm

# Triggered by tags created by release-please (e.g. core-v0.2.0).
# Using push.tags instead of release.created because GITHUB_TOKEN-created
# releases do not trigger subsequent workflow runs.

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read
  id-token: write  # required for npm provenance attestation

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Publish packages
        run: pnpm -r --filter "@syskoio/*" publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
